<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yukti-Ai | Secure Billing Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .payment-card { background: white; border-radius: 24px; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="py-12 px-6">

    <div class="max-w-3xl mx-auto">
        <!-- Logo & Title -->
        <div class="text-center mb-12">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tighter">YUKTI-AI</h1>
            <p id="plan-banner" class="text-blue-600 font-bold uppercase tracking-widest text-[10px] mt-2 bg-blue-50 inline-block px-4 py-1 rounded-full">Secure Checkout</p>
        </div>

        <div class="payment-card p-8 md:p-12">
            <div class="flex justify-between items-center mb-8 border-b pb-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Billing Information</h2>
                    <p class="text-slate-400 text-xs uppercase font-bold mt-1">Order Summary: <span id="display-plan" class="text-slate-700">Loading...</span></p>
                </div>
                <div class="text-right">
                    <span id="display-price" class="text-2xl font-black text-slate-800">--</span>
                </div>
            </div>
            
            <form class="space-y-6">
                <!-- Row 1: Company & GST -->
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Company / Individual Name</label>
                        <input type="text" id="bill_company" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition" required>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">GST Number (Optional)</label>
                        <input type="text" id="bill_gst" placeholder="e.g. 24AAAAA0000A1Z5" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>
                </div>

                <!-- Row 2: Person & Mobile -->
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Contact Person Name</label>
                        <input type="text" id="bill_person" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition" required>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Mobile Number</label>
                        <input type="tel" id="bill_mobile" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition" required>
                    </div>
                </div>

                <!-- Row 3: Email -->
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Email ID (For License Delivery)</label>
                    <input type="email" id="bill_email" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition" required>
                </div>

                <!-- Row 4: Address -->
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Office / Billing Address</label>
                    <textarea id="bill_address" class="p-3 bg-slate-50 border rounded-xl outline-none h-24 focus:ring-2 focus:ring-blue-500 transition" required></textarea>
                </div>

                <!-- Payment Methods Section -->
                <div class="pt

  <!-- Payment Methods Section -->
                <div class="pt-8">
                    <h3 class="text-lg font-bold text-slate-800 mb-6 text-center uppercase tracking-tighter">Supported Payment Methods</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <label class="cursor-pointer border-2 p-4 rounded-xl flex flex-col items-center gap-3 hover:border-blue-500 hover:bg-blue-50 transition border-blue-100 bg-blue-50/20">
                            <input type="radio" name="pay-mode" class="hidden" checked>
                            <i class="fa-solid fa-qrcode text-blue-600 text-3xl"></i>
                            <span class="font-bold text-[10px] uppercase tracking-tighter text-slate-600">UPI / QR Code</span>
                        </label>
                        <label class="cursor-pointer border-2 p-4 rounded-xl flex flex-col items-center gap-3 hover:border-blue-500 hover:bg-blue-50 transition border-slate-100">
                            <input type="radio" name="pay-mode" class="hidden">
                            <i class="fa-solid fa-credit-card text-blue-600 text-3xl"></i>
                            <span class="font-bold text-[10px] uppercase tracking-tighter text-slate-600">Card / NetBanking</span>
                        </label>
                        <label class="cursor-pointer border-2 p-4 rounded-xl flex flex-col items-center gap-3 hover:border-blue-500 hover:bg-blue-50 transition border-slate-100">
                            <input type="radio" name="pay-mode" class="hidden">
                            <i class="fa-solid fa-building-columns text-blue-600 text-3xl"></i>
                            <span class="font-bold text-[10px] uppercase tracking-tighter text-slate-600">Bank Transfer</span>
                        </label>
                    </div>
                </div>

                <!-- Pay Button -->
                <button type="button" onclick="finalizePayment()" class="w-full bg-blue-600 text-white py-5 rounded-xl font-extrabold text-lg shadow-2xl hover:bg-blue-700 transition mt-10 uppercase tracking-widest">
                    Confirm & Proceed to Payment
                </button>
            </form>
        </div>

        <p class="text-center text-slate-400 text-[10px] mt-10 uppercase tracking-widest font-bold">
            Secure Payment Gateway powered by Razorpay & Yukti-Ai
        </p>
    </div>

    <!-- LOGIC SCRIPT -->
    <script>
        // 1. UPDATE THESE 8 LINKS FROM YOUR RAZORPAY DASHBOARD
        const razorpayLinks = {
            "excel_monthly": "https://rzp.io/rzp/hbI582lj",
            "excel_yearly": "https://rzp.io/rzp/ION4lvH",
            "outlook_monthly": "https://rzp.io/rzp/GPlXf0hJ",
            "outlook_yearly": "https://rzp.io/rzp/m74UccaG",
            "google_monthly": "https://rzp.io/rzp/TbSZjpx",
            "google_yearly": "https://rzp.io/rzp/eBPEvOni",
            "crm_monthly": "https://rzp.io/rzp/cMKo49w",
            "crm_yearly": "https://rzp.io/rzp/iO2jRHA"
        };

        // 2. Load the Plan details from memory
        document.addEventListener("DOMContentLoaded", function() {
            const plan = localStorage.getItem('yukti_plan') || "excel";
            const cycle = localStorage.getItem('yukti_cycle') || "monthly";
            
            const names = {
                "excel": "Excel Automation",
                "outlook": "Outlook Automation",
                "google": "Google Sheet Automation",
                "crm": "Sheets to CRM Push"
            };

            const prices = {
                "excel_monthly": "₹2,999", "excel_yearly": "₹2,699",
                "outlook_monthly": "₹3,999", "outlook_yearly": "₹3,599",
                "google_monthly": "₹4,999", "google_yearly": "₹4,249",
                "crm_monthly": "₹5,999", "crm_yearly": "₹5,099"
            };

            const fullKey = plan + "_" + cycle;
            
            // Update UI
            document.getElementById('display-plan').innerText = names[plan] + " (" + cycle.toUpperCase() + ")";
            document.getElementById('display-price').innerText = prices[fullKey];
            document.getElementById('plan-banner').innerText = "PROCEEDING WITH: " + names[plan].toUpperCase();
        });

        // 3. Validation and Redirect
        function finalizePayment() {
            const plan = localStorage.getItem('yukti_plan') || "excel";
            const cycle = localStorage.getItem('yukti_cycle') || "monthly";
            const key = plan + "_" + cycle;

            // Mandatory Field Check
            const requiredIds = ['bill_company', 'bill_person', 'bill_mobile', 'bill_email', 'bill_address'];
            let isValid = true;

            requiredIds.forEach(id => {
                const el = document.getElementById(id);
                if (!el.value.trim()) {
                    el.style.borderColor = "#f87171";
                    isValid = false;
                } else {
                    el.style.borderColor = "#e2e8f0";
                }
            });

            if (!isValid) {
                alert("All billing fields are mandatory for license generation.");
                return;
            }

            const targetLink = razorpayLinks[key];
            
            if(targetLink && targetLink.startsWith("https")) {
                alert("Redirecting to Razorpay secure portal for " + key.replace('_',' ').toUpperCase() + "...");
                window.location.href = targetLink;
            } else {
                alert("Technical Error: Payment link for this plan is not configured. Please contact support.");
            }
        }
    </script>
</body>
</html>
