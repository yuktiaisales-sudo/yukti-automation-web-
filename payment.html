<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yukti-Ai | Billing & Secure Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .payment-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="py-12 px-6">

    <div class="max-w-3xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-800">YUKTI-AI</h1>
            <p class="text-blue-600 font-bold uppercase tracking-widest text-xs mt-2">Billing & License Activation</p>
        </div>

        <div class="payment-card p-8 md:p-12 border border-slate-200">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Billing Information</h2>
            <p class="text-slate-500 mb-8 border-b pb-4 text-sm">Please provide your details to generate your secure link.</p>
            
            <form id="billing-form" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Company / Individual Name</label>
                        <input type="text" id="bill_company" class="p-3 bg-slate-50 border rounded-lg outline-none" required>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">GST Number (Optional)</label>
                        <input type="text" id="bill_gst" placeholder="24AAAAA0000A1Z5" class="p-3 bg-slate-50 border rounded-lg outline-none">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Contact Person</label>
                        <input type="text" id="bill_person" class="p-3 bg-slate-50 border rounded-lg outline-none" required>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Mobile Number</label>
                        <input type="tel" id="bill_mobile" class="p-3 bg-slate-50 border rounded-lg outline-none" required>
                    </div>
                </div>

                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Office / Billing Address</label>
                    <textarea id="bill_address" class="p-3 bg-slate-50 border rounded-lg outline-none h-24" required></textarea>
                </div>

                <div class="text-center pt-6">
                    <p class="text-xs font-bold text-slate-400 mb-4 uppercase">All Major Payment Methods Supported</p>
                    <div class="flex justify-center gap-6 text-2xl text-slate-300">
                        <i class="fa-brands fa-cc-visa"></i>
                        <i class="fa-brands fa-cc-mastercard"></i>
                        <i class="fa-solid fa-qrcode"></i>
                        <i class="fa-solid fa-building-columns"></i>
                    </div>
                </div>

                <button type="button" onclick="finalizePayment()" class="w-full bg-blue-600 text-white py-5 rounded-xl font-extrabold text-lg shadow-2xl hover:bg-blue-700 transition mt-10 uppercase tracking-widest">
                    Confirm & Proceed to Payment
                </button>
            </form>
        </div>

        <p class="text-center text-slate-400 text-xs mt-10 uppercase tracking-widest font-bold">&copy; 2026 Yukti-Ai | Secure Payment Portal</p>
    </div>

    <script>
         // 1. DYNAMIC UI UPDATE
    // This runs the moment the page opens to show the correct plan
    document.addEventListener("DOMContentLoaded", function() {
        const planName = localStorage.getItem('selectedPlanName') || "Excel Automation";
        const planPrice = localStorage.getItem('selectedPlanPrice') || "₹2,999";
        
        // Update the header on the payment page
        document.querySelector('p.text-blue-600').innerText = "PROCEEDING WITH: " + planName.toUpperCase();
        document.querySelector('h2.text-2xl').innerText = "Billing: " + planName + " (" + planPrice + ")";
    });

    <script>
    function finalizePayment() {
        // 1. DYNAMIC DISCOUNTED LINKS
        const links = {
            "excel": "https://rzp.io/rzp/xzEwX7u", // ₹2,999
            "outlook": "https://rzp.io/rzp/yHLyTHae", // ₹3,599 (10% off)
            "google": "https://rzp.io/rzp/1T2K9ktr", // ₹4,249 (15% off)
             "crm": "https://rzp.io/rzp/IVJOS7jI" // ₹5,099 (15% off)
        };

        const params = new URLSearchParams(window.location.search);
        const plan = params.get('plan') || "excel"; 

        // 2. MANDATORY FIELD CHECK
        const company = document.getElementById('bill_company').value;
        const person = document.getElementById('bill_person').value;
        const mobile = document.getElementById('bill_mobile').value;
        const email = document.getElementById('bill_email').value;

        if (!company || !person || !mobile || !email) {
            alert("All fields are mandatory. Please provide full billing details.");
            return;
        }

        // 3. PROCEED TO RAZORPAY
        const target = links[plan];
        alert("Inquiry Logged. Redirecting to Secure Gateway for " + plan.toUpperCase() + "...");
        window.location.href = target;
    }

            alert("Error: Link for " + planID + " not set yet.");
        }
    }
    </script>
</body>
</html>
