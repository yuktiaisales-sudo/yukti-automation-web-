<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yukti-Ai | Billing & Secure Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .payment-card { background: white; border-radius: 24px; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .input-style { padding: 12px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; width: 100%; outline: none; transition: 0.2s; }
        .input-style:focus { border-color: #2563eb; background-color: #fff; }
    </style>
</head>
<body class="py-12 px-6">

    <div class="max-w-3xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter">YUKTI-AI</h1>
            <p id="plan-banner" class="mt-2 inline-block px-4 py-1 rounded-full bg-blue-600 text-white text-[10px] font-bold uppercase tracking-widest">ORDER PROCESSING</p>
        </div>

        <div class="payment-card p-8 md:p-12">
            <div class="flex justify-between items-start mb-10 border-b pb-8">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Order Summary</h2>
                    <p id="display-plan" class="text-blue-600 font-bold text-sm mt-1 uppercase">Loading...</p>
                </div>
                <div class="text-right">
                    <div id="display-price" class="text-3xl font-black text-slate-800">--</div>
                    <p id="billing-cycle-text" class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-tighter">Tax Invoice + GST</p>
                </div>
            </div>
            
            <!-- We send this form to Formspree to capture the order details before Razorpay -->
            <form id="billing-form" action="https://formspree.io/f/xzdqjjby" method="POST" class="space-y-6">
                <!-- Hidden fields for Formspree to know which plan was bought -->
                <input type="hidden" name="ordered_plan" id="hidden-plan">
                <input type="hidden" name="ordered_price" id="hidden-price">

                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Company Name</label>
                        <input type="text" name="company" id="bill_company" class="input-style" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">GST Number</label>
                        <input type="text" name="gst" id="bill_gst" placeholder="Optional" class="input-style">
                    </div>
                </div>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Contact Person</label>
                        <input type="text" name="contact_name" id="bill_person" class="input-style" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Mobile</label>
                        <input type="tel" name="mobile" id="bill_mobile" class="input-style" required>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Email ID</label>
                    <input type="email" name="email" id="bill_email" class="input-style" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Billing Address</label>
                    <textarea name="address" id="bill_address" class="input-style h-24" required></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white py-5 rounded-xl font-black text-lg shadow-2xl hover:bg-blue-700 transition mt-10 uppercase tracking-widest">
                    Confirm & Proceed to Payment
                </button>
            </form>
        </div>
    </div>

    <script>
        // --- 1. RAZORPAY SUBSCRIPTION LINKS ---
        const razorpayLinks = {
           "excel_monthly": "https://rzp.io/rzp/8rsLH0Az", // ₹2,999
            "excel_yearly": "https://rzp.io/rzp/kckrDae",  // ₹32,388 (Lump Sum)
            "outlook_monthly": "https://rzp.io/rzp/4agOCOv", // ₹3,999
            "outlook_yearly": "https://rzp.io/rzp/lNlwiq7P",  // ₹43,188 (Lump Sum)
            "google_monthly": "https://rzp.io/rzp/JB5wx5M", // ₹4,999
            "google_yearly": "https://rzp.io/rzp/0oI7H4de",  // ₹50,988 (Lump Sum)
            "crm_monthly": "https://rzp.io/rzp/ChLNOpt",    // ₹5,999
            "crm_yearly": "https://rzp.io/rzp/GxPZDHzX"      // ₹61,188 (Lump Sum)
        };


        const prices = {
            "excel_monthly": "₹2,999", "excel_yearly": "₹32,388",
            "outlook_monthly": "₹3,999", "outlook_yearly": "₹43,188",
            "google_monthly": "₹4,999", "google_yearly": "₹50,988",
            "crm_monthly": "₹5,999", "crm_yearly": "₹61,188"
        };

        const names = {
            "excel": "Excel Automation",
            "outlook": "Outlook Automation",
            "google": "Google Sheet Automation",
            "crm": "Sheets to CRM Push"
        };

        // --- 2. DYNAMIC UI UPDATE ---
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const plan = params.get('plan') || "excel";
            const cycle = params.get('cycle') || "monthly";
            const fullKey = plan + "_" + cycle;

            document.getElementById('display-plan').innerText = (names[plan]) + " (" + cycle.toUpperCase() + ")";
            document.getElementById('display-price').innerText = prices[fullKey];
            document.getElementById('hidden-plan').value = names[plan] + " (" + cycle.toUpperCase() + ")";
            document.getElementById('hidden-price').value = prices[fullKey];
        };

        // --- 3. FORM SUBMISSION (EMAIL) THEN REDIRECT ---
        const form = document.getElementById("billing-form");
        form.addEventListener("submit", async function(e) {
            e.preventDefault();
            const btn = document.getElementById("submit-btn");
            btn.disabled = true; 
            btn.innerText = "CAPTURING ORDER...";

            const params = new URLSearchParams(window.location.search);
            const fullKey = (params.get('plan') || "excel") + "_" + (params.get('cycle') || "monthly");

            // Step 1: Send details to yuktiaisales@gmail.com via Formspree
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    // Step 2: Redirect to Razorpay
                    btn.innerText = "REDIRECTING TO GATEWAY...";
                    window.location.href = links[fullKey];
                } else {
                    alert("Submission failed. Redirecting directly to gateway...");
                    window.location.href = links[fullKey];
                }
            } catch (err) {
                window.location.href = links[fullKey];
            }
        });
    </script>
</body>
</html>
