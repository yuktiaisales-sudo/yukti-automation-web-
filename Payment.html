<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yukti-Ai | Billing & Secure Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .payment-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="py-12 px-6">

    <div class="max-w-3xl mx-auto">
        <!-- Logo/Brand -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-800">YUKTI-AI</h1>
            <p class="text-blue-600 font-bold uppercase tracking-widest text-xs mt-2">Billing & License Activation</p>
        </div>

        <div class="payment-card p-8 md:p-12 border border-slate-200">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Billing Information</h2>
            <p class="text-slate-500 mb-8 border-b pb-4 text-sm">Please provide your tax and business details to proceed.</p>
            
            <form class="space-y-6">
                <!-- Company & GST -->
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Company / Individual Name</label>
                        <input type="text" class="p-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">GST Number (Optional)</label>
                        <input type="text" placeholder="24AAAAA0000A1Z5" class="p-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <!-- Contact Details -->
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Contact Person</label>
                        <input type="text" class="p-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Mobile Number</label>
                        <input type="tel" class="p-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                </div>

                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Office / Billing Address</label>
                    <textarea class="p-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none h-24" required></textarea>
                </div>

                <!-- Payment Selection -->
                <div class="pt-8">
                    <h3 class="text-lg font-bold text-slate-800 mb-6">Select Payment Method</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <label class="cursor-pointer border-2 p-4 rounded-xl flex flex-col items-center gap-3 hover:border-blue-500 hover:bg-blue-50 transition border-blue-100">
                            <input type="radio" name="pay-mode" class="hidden" checked>
                            <i class="fa-solid fa-qrcode text-blue-600 text-3xl"></i>
                            <span class="font-bold text-xs uppercase tracking-tighter">UPI / QR Code</span>
                        </label>
                        <label class="cursor-pointer border-2 p-4 rounded-xl flex flex-col items-center gap-3 hover:border-blue-500 hover:bg-blue-50 transition border-slate-100">
                            <input type="radio" name="pay-mode" class="hidden">
                            <i class="fa-solid fa-credit-card text-blue-600 text-3xl"></i>
                            <span class="font-bold text-xs uppercase tracking-tighter">Card / NetBanking</span>
                        </label>
                        <label class="cursor-pointer border-2 p-4 rounded-xl flex flex-col items-center gap-3 hover:border-blue-500 hover:bg-blue-50 transition border-slate-100">
                            <input type="radio" name="pay-mode" class="hidden">
                            <i class="fa-solid fa-building-columns text-blue-600 text-3xl"></i>
                            <span class="font-bold text-xs uppercase tracking-tighter">Bank Transfer</span>
                        </label>
                    </div>
                </div>

                <!-- Pay Button -->
                <button type="button" onclick="finalizePayment()" class="w-full bg-blue-600 text-white py-5 rounded-xl font-extrabold text-lg shadow-2xl hover:bg-blue-700 transition mt-10 uppercase tracking-widest">
                    Confirm & Proceed to Payment
                </button>
            </form>
        </div>

        <p class="text-center text-slate-400 text-xs mt-10 uppercase tracking-widest font-bold">
            Secure Payment Gateway powered by Yukti-Ai
        </p>
    </div>

    <script>
        function finalizePayment() {
            alert("Verification and Automated Link Generation in Progress. \n\nour sales team will send you the secure payment link via WhatsApp and Email within 15 minutes.");
            window.location.href = "index.html"; 
        }
    </script>
</body>
</html>
